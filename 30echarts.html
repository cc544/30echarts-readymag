<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>就业率对比</title>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
  <style>
    * {margin:0;padding:0;box-sizing:border-box}
    html,body {width:100%;height:100%;overflow:hidden;background:transparent}
    #main {width:100%;height:100%}
  </style>
</head>
<body>
<div id="main"></div>
<script>
const chartDom = document.getElementById('main');
const myChart = echarts.init(chartDom);
const option = {
  backgroundColor: 'transparent',
  title: {
    text: '就业率终极对比图',
    left: 'center',
    textStyle: { fontSize: 18, color: '#333', fontWeight: 500 }
  },
  tooltip: {
    trigger: 'axis',
    formatter: '{b}：{c}%\n就业宽度仅为普通应届生1/4'
  },
  grid: {
    left: '6%',
    right: '6%',
    bottom: '8%',
    containLabel: true
  },
  xAxis: {
    type: 'category',
    data: ['普通本科应届生', '听障本科应届生'],
    axisTick: { alignWithLabel: true },
    axisLine: { lineStyle: { color: '#eee' } },
    axisLabel: { fontSize: 10, color: '#555' }
  },
  yAxis: {
    type: 'value',
    max: 100,
    name: '就业率 (%)',
    axisLabel: { formatter: '{value}%', fontSize: 11, color: '#555' },
    splitLine: { lineStyle: { color: '#f0f0f0', type: 'dashed' } },
    axisLine: { show: false },
    axisTick: { show: false }
  },
  series: [
    {
      type: 'bar',
      barWidth: '45%',
      data: [
        {
          value: 89.6,
          itemStyle: {
            color: new echarts.graphic.LinearGradient(0,0,0,1,[
              {offset:0, color:'#f9e7b8'},
              {offset:1, color:'#c8ecf2'}
            ]),
            borderRadius: [8,8,0,0],
            shadowBlur: 10,
            shadowColor: 'rgba(249,231,184,0.22)'
          }
        },
        {
          value: 47.3,
          itemStyle: {
            color: new echarts.graphic.LinearGradient(0,0,0,1,[
              {offset:0, color:'#f2c1c7'},
              {offset:1, color:'#e0f6f9'}
            ]),
            borderRadius: [8,8,0,0],
            shadowBlur: 10,
            shadowColor: 'rgba(232,152,162,0.22)'
          }
        }
      ],
      label: {
        show: true,
        position: 'top',
        fontSize: 11,
        color: '#333',
        formatter: '{c}%\n就业宽度仅为普通应届生1/4'
      }
    }
  ]
};
myChart.setOption(option);
window.addEventListener('resize', ()=>myChart.resize())
</script>
</body>
</html>
